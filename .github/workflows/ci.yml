name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  firmware-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install platformio
      - run: |
          cd firmware/esp32-security-module
          pio run

  openscad-render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install OpenSCAD
        run: sudo apt-get update && sudo apt-get install -y openscad
      - name: Render check
        run: |
          openscad -o /tmp/case-check.png hardware/case/case.scad
